name: Auto Update NOTES

on:
  push:
    branches: [ main ]

jobs:
  update-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run NOTES generator
        run: |
          chmod +x generate_notes.sh
          ./generate_notes.sh

      - name: Commit & push NOTES
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add NOTES.md
          git commit -m "Auto-update NOTES.md" || echo "No changes to commit"
          git push
